<!DOCTYPE html>
<html lang="tr">
<head>
<!-- Yerel fontlar: Montserrat ve Exo 2 -->
<style>
  @font-face {
    font-family: 'Montserrat';
    src: url('resim/fonts/Montserrat.ttf') format('truetype');
    font-weight: 400;
    font-style: normal;
  }
  @font-face {
    font-family: 'Exo2';
    src: url('resim/fonts/Exo2-Regular.ttf') format('truetype');
    font-weight: 400;
    font-style: normal;
  }
  @font-face {
    font-family: 'Exo2';
    src: url('resim/fonts/Exo2-Bold.ttf') format('truetype');
    font-weight: 700;
    font-style: normal;
  }
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tahta Kilit</title>
<style>
  :root {
    --bg: #f7f7f7;
    --surface: #fff;
    --accent: #222;
    --accent2: #444;
    --text: #111;
    --text2: #333;
    --text3: #bbb;
    --border: #e0e0e0;
    --border-light: rgba(0,0,0,0.08);
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100vh;
    overflow: hidden;
    font-family: 'Montserrat', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  .sayfa {
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ===== HEADER ===== */
  .header {
    background: linear-gradient(to left, rgba(234,238,245,0.85) 0%, transparent 100%);
    height: 48px;
    padding: 0 1.5vw;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    border-bottom: 1px solid transparent;
    border-image: linear-gradient(to left, var(--border) 0%, transparent 100%) 1;
    flex-shrink: 0;
    z-index: 2;
  }
  .header h1 {
    font-size: clamp(16px, 2.2vw, 28px);
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.3px;
    text-align: right;
  }

  /* ===== ANA ALAN ===== */
  .ana-alan {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    min-height: 0;
    overflow: hidden;
    padding: 0;
  }

  /* Parçacık arka plan */
  .parcaciklar {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .parcacik {
    position: absolute;
    border-radius: 50%;
    opacity: 0;
    animation: parcacikUc 18s ease-in-out infinite;
  }
  @keyframes parcacikUc {
    0%   { opacity: 0; transform: translateY(0) scale(0.5); }
    15%  { opacity: 0.6; }
    85%  { opacity: 0.6; }
    100% { opacity: 0; transform: translateY(-30vh) scale(1.2); }
  }

  /* Kart yapısı kaldırıldı */
  .kart-baslik .baslik-ikon {
    font-size: clamp(12px, 1.4vh, 16px);
  }
  .kart-icerik {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5vh 1vw;
    min-height: 0;
  }

  /* ===== SOL SÜTUN ===== */
  .sol-sutun {
    display: flex;
    flex-direction: column;
    gap: 1.5vh;
    min-height: 0;
    z-index: 1;
  }

  /* --- Mini Takvim --- */
  .takvim-kart { flex: 1; }
  .takvim-kart .kart-icerik { padding: 1.2vh 1vw; gap: 0.8vh; }
  .takvim-ay-baslik {
    font-size: clamp(14px, 1.6vw, 20px);
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 0.3vh;
  }
  .takvim-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    width: 100%;
  }
  .takvim-gun-baslik {
    text-align: center;
    font-size: clamp(8px, 0.8vw, 11px);
    font-weight: 700;
    color: var(--text3);
    padding: 0.3vh 0;
    text-transform: uppercase;
  }
  .takvim-gun {
    text-align: center;
    font-size: clamp(10px, 1.1vw, 14px);
    font-weight: 600;
    color: var(--text2);
    padding: 0.6vh 0;
    border-radius: 6px;
    transition: all 0.15s;
  }
  .takvim-gun.bos { visibility: hidden; }
  .takvim-gun.bugun {
    background: var(--accent);
    color: #fff;
    font-weight: 800;
  }
  .takvim-gun.gecmis { color: var(--text3); opacity: 0.5; }
  .takvim-gun.pazar-gunu { color: #dc3545; }
  .takvim-gun.bugun.pazar-gunu { color: #fff; }

  /* --- Geri Sayım --- */
  .geri-sayim-kart { flex: 1; }
  .geri-sayim-kart .kart-icerik { gap: 1.2vh; }
  .gs-kutular {
    display: flex;
    align-items: center;
    gap: 0.6vw;
  }
  .gs-kutu {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: var(--bg);
    border-radius: 10px;
    padding: 1vh 0.8vw;
    min-width: clamp(42px, 5vw, 68px);
  }
  .gs-kutu-rakam {
    font-size: clamp(22px, 3.8vh, 40px);
    font-weight: 800;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .gs-kutu-etiket {
    font-size: clamp(7px, 0.7vw, 10px);
    font-weight: 700;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 0.4vh;
  }
  .gs-ayirici {
    font-size: clamp(18px, 2.8vh, 30px);
    font-weight: 800;
    color: var(--text3);
    opacity: 0.3;
  }
  .gs-hedef {
    font-size: clamp(10px, 1vw, 14px);
    color: var(--text3);
    font-weight: 500;
  }
  .gs-ilerleme {
    width: 85%;
    height: 8px;
    background: var(--border-light);
    border-radius: 4px;
    overflow: hidden;
  }
  .gs-ilerleme-bar {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.3s;
  }
  .gs-yuzde {
    font-size: clamp(9px, 0.9vw, 12px);
    font-weight: 700;
    color: var(--accent);
  }

  /* Sade saat ve tarih */
  .saat-tarih-alani {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1;
    background: none;
    border-radius: 0;
    box-shadow: none;
    padding: 0;
    min-width: 0;
    min-height: 0;
    width: 100%;
    height: 100%;
  }
  .analog-saat-alani {
    position: relative;
    width: clamp(320px, 40vw, 420px);
    height: clamp(320px, 40vw, 420px);
    flex-shrink: 0;
    margin-bottom: 2vh;
    filter: drop-shadow(0 4px 32px #0002);
    background: rgba(255,255,255,0.18);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .analog-saat-alani svg { width: 100%; height: 100%; }
  .kadran-dis { fill: #fff; stroke: #222; stroke-width: 2.5; }
  .saat-merkez { fill: #222; }
  .akrep { stroke: #111; stroke-width: 5; stroke-linecap: round; }
  .yelkovan { stroke: #444; stroke-width: 3.5; stroke-linecap: round; }
  .saniye { stroke: #bbb; stroke-width: 2.2; stroke-linecap: round; }
  .saat-rakam {
    font-size: 18px;
    font-weight: 700;
    fill: #444;
    text-anchor: middle;
    dominant-baseline: central;
    filter: drop-shadow(0 1px 2px #fff8);
  }
  .saat-cizgi-buyuk { stroke: #444; stroke-width: 3; stroke-linecap: round; }
  .saat-cizgi-kucuk { stroke: #bbb; stroke-width: 1.2; stroke-linecap: round; }
  .dijital-saat {
    font-size: clamp(56px, 10vw, 110px);
    font-weight: 900;
    color: #222;
    font-variant-numeric: tabular-nums;
    letter-spacing: 4px;
    line-height: 1;
    margin-top: 2vh;
    text-shadow: 0 2px 16px #0002, 0 1px 0 #fff;
    text-align: center;
  }
  .dijital-saat .iki-nokta {
    animation: yanipson 1s step-end infinite;
    color: #444;
    text-shadow: 0 2px 16px #0002, 0 1px 0 #fff;
  }
  @keyframes yanipson {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }
  .dijital-saniye {
    font-size: clamp(22px, 3vw, 38px);
    font-weight: 700;
    color: #e11d48;
    font-variant-numeric: tabular-nums;
    opacity: 0.85;
    margin-left: 16px;
    text-shadow: 0 2px 16px #e11d4822, 0 1px 0 #fff;
  }
  .tarih-alani {
    text-align: center;
    margin-top: 3vh;
  }
  .tarih-gun-adi {
    font-size: clamp(22px, 2.5vw, 36px);
    font-weight: 800;
    color: #222;
    text-transform: uppercase;
    letter-spacing: 3px;
    text-shadow: 0 1px 0 #fff, 0 2px 8px #0001;
  }
  .tarih-tam {
    font-size: clamp(16px, 1.6vw, 26px);
    font-weight: 600;
    color: #333;
    margin-top: 0.6vh;
    letter-spacing: 0.5px;
    text-shadow: 0 1px 0 #fff;
  }

  /* ===== SAĞ SÜTUN ===== */
  .sag-sutun {
    display: flex;
    flex-direction: column;
    gap: 1.5vh;
    min-height: 0;
    z-index: 1;
  }

  /* Günün Sözü */
  .soz-kart { flex: 1; }
  .soz-kart .kart-icerik {
    text-align: center;
    padding: 1.5vh 1.2vw;
    gap: 0.8vh;
  }
  .soz-tirnak {
    font-size: clamp(36px, 5vh, 56px);
    color: var(--accent);
    opacity: 0.25;
    font-family: Georgia, serif;
    line-height: 1;
  }
  .soz-metin {
    font-size: clamp(13px, 1.4vw, 20px);
    color: var(--text);
    font-weight: 600;
    font-style: italic;
    line-height: 1.7;
  }
  .soz-yazar {
    font-size: clamp(11px, 1.1vw, 16px);
    color: var(--accent);
    font-weight: 700;
    margin-top: 0.3vh;
  }

  /* Durum Kartı */
  .durum-kart { flex: 1; }
  .durum-kart .kart-icerik { gap: 1.2vh; }
  .durum-halka-alani {
    position: relative;
    width: clamp(50px, 7vh, 80px);
    height: clamp(50px, 7vh, 80px);
  }
  .durum-halka-alani svg {
    width: 100%;
    height: 100%;
    animation: dondur 3s linear infinite;
  }
  @keyframes dondur { 100% { transform: rotate(360deg); } }
  .durum-halka-bg { fill: none; stroke: var(--border-light); stroke-width: 3; }
  .durum-halka { fill: none; stroke: var(--accent); stroke-width: 3; stroke-linecap: round; stroke-dasharray: 90 160; }
  .durum-ikon {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: clamp(16px, 2.2vh, 24px);
  }
  .durum-yazi {
    font-size: clamp(12px, 1.3vw, 18px);
    font-weight: 700;
    color: var(--text);
    text-align: center;
  }
  .durum-alt-yazi {
    font-size: clamp(10px, 1vw, 14px);
    color: var(--text3);
    font-weight: 500;
    text-align: center;
  }
  .durum-sinif {
    font-size: clamp(11px, 1.2vw, 16px);
    font-weight: 700;
    color: var(--accent2);
    margin-top: 0.5vh;
    padding: 0.4vh 1.2vw;
    background: linear-gradient(135deg, rgba(37,99,235,0.08), rgba(79,70,229,0.08));
    border-radius: 8px;
    letter-spacing: 0.5px;
  }

  /* ===== FOOTER BAR ===== */
  .footer-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 21px;
    padding: 0 1.5vw;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 2;
    font-family: 'Exo 2', Arial, sans-serif;
  }
  .footer-bar .cevrimdisi-durum {
    display: flex;
    align-items: center;
    gap: 0.4vw;
  }
  .footer-bar .f-nokta {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    animation: nabiz 2s ease-in-out infinite;
  }
  .footer-bar .durum-etiket {
    font-size: clamp(7px, 0.8vw, 11px);
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .footer-bar .versiyon {
    font-size: clamp(7px, 0.7vw, 10px);
    color: var(--text3);
    font-weight: 600;
  }
  @keyframes nabiz {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.4); }
  }
</style>
</head>
<body>
<div class="sayfa">

  <!-- HEADER -->
  <div class="header">
    <h1 id="headerKurumAdi"></h1>
  </div>

  <!-- ANA ALAN -->
  <div class="ana-alan">
    <div class="parcaciklar" id="parcaciklar"></div>
    <div class="saat-tarih-alani">
      <div class="analog-saat-alani">
        <svg viewBox="0 0 200 200" id="analogSaat">
          <circle cx="100" cy="100" r="96" class="kadran-dis" />
          <g id="saatCizgileri"></g>
          <line id="akrep" x1="100" y1="100" x2="100" y2="48" class="akrep" />
          <line id="yelkovan" x1="100" y1="100" x2="100" y2="30" class="yelkovan" />
          <line id="saniyeIbre" x1="100" y1="110" x2="100" y2="26" class="saniye" />
          <circle cx="100" cy="100" r="4" class="saat-merkez" />
          <circle cx="100" cy="100" r="2" fill="#fff" />
        </svg>
      </div>
      <div class="dijital-saat" id="dijitalSaat"></div>
      <div class="tarih-alani">
        <div class="tarih-gun-adi" id="tarihGunAdi"></div>
        <div class="tarih-tam" id="tarihTam"></div>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer-bar">
    <div class="cevrimdisi-durum">
      <span class="f-nokta"></span>
      <span class="durum-etiket">Çevrimdışı Mod</span>
    </div>
    <div class="versiyon">Etap Tahta Kilit v1.0</div>
  </div>

</div>
<script>
  // === Parametreler ===
  const params = new URLSearchParams(window.location.search);
  const kurumAdi = decodeURIComponent(params.get('kurum') || '');
  const sinifAdi = decodeURIComponent(params.get('sinif') || '');
  document.getElementById('headerKurumAdi').textContent = (kurumAdi || 'TAHTA KİLİT').toUpperCase();
  // Sınıf adı ve durum kartı kaldırıldı

  // === Analog Saat Çizgileri ===
  (function() {
    const g = document.getElementById('saatCizgileri');
    for (let i = 0; i < 60; i++) {
      const aci = (i * 6) * Math.PI / 180;
      const buyuk = i % 5 === 0;
      const r1 = buyuk ? 80 : 86, r2 = 92;
      const x1 = 100 + r1 * Math.sin(aci), y1 = 100 - r1 * Math.cos(aci);
      const x2 = 100 + r2 * Math.sin(aci), y2 = 100 - r2 * Math.cos(aci);
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', x1); line.setAttribute('y1', y1);
      line.setAttribute('x2', x2); line.setAttribute('y2', y2);
      line.setAttribute('class', buyuk ? 'saat-cizgi-buyuk' : 'saat-cizgi-kucuk');
      g.appendChild(line);
      if (buyuk) {
        const saatNo = i / 5 || 12;
        const rN = 70;
        const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        txt.setAttribute('x', 100 + rN * Math.sin(aci));
        txt.setAttribute('y', 100 - rN * Math.cos(aci));
        txt.setAttribute('class', 'saat-rakam');
        txt.textContent = saatNo;
        g.appendChild(txt);
      }
    }
  })();

  // === Saat Güncelleme ===
  const gunler = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
  const aylar = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran',
                 'Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];

  function saatGuncelle() {
    const n = new Date();
    const s = n.getHours(), dk = n.getMinutes(), sn = n.getSeconds(), ms = n.getMilliseconds();
    const snA = (sn + ms/1000)*6, dkA = (dk + sn/60)*6, sA = ((s%12) + dk/60)*30;
    document.getElementById('akrep').setAttribute('transform', 'rotate('+sA+' 100 100)');
    document.getElementById('yelkovan').setAttribute('transform', 'rotate('+dkA+' 100 100)');
    document.getElementById('saniyeIbre').setAttribute('transform', 'rotate('+snA+' 100 100)');
    document.getElementById('dijitalSaat').innerHTML =
      String(s).padStart(2,'0') + '<span class="iki-nokta">:</span>' + String(dk).padStart(2,'0');
    // Tarih gösterimi
    document.getElementById('tarihGunAdi').textContent = gunler[n.getDay()];
    document.getElementById('tarihTam').textContent = n.getDate() + ' ' + aylar[n.getMonth()] + ' ' + n.getFullYear();
  }
  saatGuncelle();
  setInterval(saatGuncelle, 100);

  // === Mini Takvim ===
  (function() {
    const bugun = new Date();
    const yil = bugun.getFullYear(), ay = bugun.getMonth();
    document.getElementById('takvimAyBaslik').textContent = aylar[ay] + ' ' + yil;
    const grid = document.getElementById('takvimGrid');
    const gunBasliklari = ['Pt','Sa','Ça','Pe','Cu','Ct','Pz'];
    gunBasliklari.forEach(g => {
      const d = document.createElement('div');
      d.className = 'takvim-gun-baslik';
      d.textContent = g;
      grid.appendChild(d);
    });
    const ilkGun = new Date(yil, ay, 1);
    let baslangic = ilkGun.getDay();
    baslangic = baslangic === 0 ? 6 : baslangic - 1; // Pazartesi=0
    const toplamGun = new Date(yil, ay+1, 0).getDate();
    for (let i = 0; i < baslangic; i++) {
      const d = document.createElement('div');
      d.className = 'takvim-gun bos';
      d.textContent = '';
      grid.appendChild(d);
    }
    for (let g = 1; g <= toplamGun; g++) {
      const d = document.createElement('div');
      d.className = 'takvim-gun';
      d.textContent = g;
      if (g === bugun.getDate()) d.classList.add('bugun');
      if (g < bugun.getDate()) d.classList.add('gecmis');
      const gunHaftasi = new Date(yil, ay, g).getDay();
      if (gunHaftasi === 0) d.classList.add('pazar-gunu');
      grid.appendChild(d);
    }
  })();

  // === Geri Sayım (Yaz Tatili - 20 Haziran) ===
  (function() {
    const yil = new Date().getFullYear();
    let hedef = new Date(yil, 5, 20, 0, 0, 0);
    if (new Date() > hedef) hedef = new Date(yil+1, 5, 20, 0, 0, 0);
    document.getElementById('gsHedef').textContent = 'Yaz Tatili \u2022 ' + hedef.getDate() + ' ' + aylar[hedef.getMonth()] + ' ' + hedef.getFullYear();

    function geriSayimGuncelle() {
      const simdi = new Date();
      const farkMs = hedef - simdi;
      if (farkMs <= 0) {
        document.getElementById('gsGun').textContent = '0';
        document.getElementById('gsSaat').textContent = '0';
        document.getElementById('gsDakika').textContent = '0';
        document.getElementById('gsSaniye').textContent = '0';
        return;
      }
      const gun = Math.floor(farkMs / (1000*60*60*24));
      const saat = Math.floor((farkMs % (1000*60*60*24)) / (1000*60*60));
      const dakika = Math.floor((farkMs % (1000*60*60)) / (1000*60));
      const saniye = Math.floor((farkMs % (1000*60)) / 1000);
      document.getElementById('gsGun').textContent = gun;
      document.getElementById('gsSaat').textContent = String(saat).padStart(2,'0');
      document.getElementById('gsDakika').textContent = String(dakika).padStart(2,'0');
      document.getElementById('gsSaniye').textContent = String(saniye).padStart(2,'0');

      // İlerleme
      let donemBasi = new Date(yil, 8, 1);
      if (simdi < donemBasi) donemBasi = new Date(yil-1, 8, 1);
      const toplamGun = Math.ceil((hedef - donemBasi) / (1000*60*60*24));
      const gecenGun = Math.ceil((simdi - donemBasi) / (1000*60*60*24));
      const yuzde = Math.min(100, Math.max(0, Math.round((gecenGun / toplamGun) * 100)));
      document.getElementById('gsBar').style.width = yuzde + '%';
      document.getElementById('gsYuzde').textContent = '% ' + yuzde + ' tamamland\u0131';
    }
    geriSayimGuncelle();
    setInterval(geriSayimGuncelle, 1000);
  })();

  // === Günün Sözü ===
  const sozler = [
    {metin: "Eğitim, geleceğin pasaportudur; çünkü yarın, ona bugün hazırlananlarındır.", yazar: "Malcolm X"},
    {metin: "Bir kitap, bir kalem, bir çocuk ve bir öğretmen dünyayı değiştirebilir.", yazar: "Malala Yousafzai"},
    {metin: "Öğretmenler, toplumun en fedakâr ve en önemli üyeleridir.", yazar: "M. Kemal Atatürk"},
